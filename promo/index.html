<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="gsap.min.js"></script>
    <script src="three.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      #root { position: absolute; inset: 0; }
      #gl { position: absolute; inset: 0; }
      .tex { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
      #word {
        position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); text-align: center;
        color: #fff; font-family: "Helvetica Neue", Arial, sans-serif;
        font-weight: 200; font-size: 40px; letter-spacing: 0.42em; opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="40" data-width="1920" data-height="1080">
      <!-- textures preloaded as DOM images so the renderer's media-ready gate covers them -->
      <img class="tex" id="tex0" src="assets/cosmic-cliffs.jpg" />
      <img class="tex" id="tex1" src="assets/pillars-of-creation.jpg" />
      <img class="tex" id="tex2" src="assets/southern-ring.jpg" />
      <img class="tex" id="tex3" src="assets/stephans-quintet.jpg" />
      <img class="tex" id="tex4" src="assets/deep-field.jpg" />
      <canvas id="gl" class="clip" data-start="0" data-duration="40" data-track-index="0"></canvas>
      <div id="word">CYCLORAMA · CURVED SCREEN</div>
    </div>

    <script>
      // The Cyclorama promo, fully as code (HyperFrames + three.js). Same parabolic panel as the app
      // (z = depth * nx^2, camera z=4.2, fov 46). Story: a white line draws in, bends and grows into
      // the curved screen; the screen broadcasts five James Webb images with the app's parallax tilt;
      // then the screen collapses back into the line it came from, and one name remains.
      // Scene + full GSAP timeline are built SYNCHRONOUSLY (workers must see the duration instantly);
      // textures go through fixed-size canvases (see comment at the loader).
      const W = 1920, H = 1080;
      const renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById("gl"),
        antialias: true,
        preserveDrawingBuffer: true,
      });
      renderer.setSize(W, H, false);
      renderer.setPixelRatio(1);
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      const camera = new THREE.PerspectiveCamera(46, W / H, 0.1, 100);
      camera.position.set(0, 0, 4.25);

      // shared parabolic geometry — bend animated by rewriting z = bend * DEPTH * nx^2
      const PANEL_W = 3.2, PANEL_H = 1.8, DEPTH = 0.42, COLS = 64, ROWS = 20;
      const geo = new THREE.PlaneGeometry(PANEL_W, PANEL_H, COLS, ROWS);
      const basePos = geo.attributes.position.array.slice();
      const state = { bend: 0 };
      function applyBend() {
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = basePos[i * 3];
          const nx = x / (PANEL_W / 2);
          pos.setZ(i, state.bend * DEPTH * nx * nx);   // + => concave (edges toward the camera)
        }
        pos.needsUpdate = true;
      }

      const group = new THREE.Group();
      scene.add(group);
      const mk = (mat, order) => { const m = new THREE.Mesh(geo, mat); m.renderOrder = order; group.add(m); return m; };

      // Textures via fixed-size canvases: GPU storage is allocated from the canvas dims (set
      // synchronously, never change) — sidesteps r149's <img>-upload race that throws
      // "GL_INVALID_VALUE: Offset overflows texture dimensions" in headless rendering.
      const TEX_W = 1280, TEX_H = 720;
      const N = 5;
      const imgs = [];
      for (let i = 0; i < N; i++) {
        const el = document.getElementById("tex" + i);
        const cv = document.createElement("canvas");
        cv.width = TEX_W; cv.height = TEX_H;
        const tex = new THREE.CanvasTexture(cv);
        tex.minFilter = THREE.LinearFilter;
        // coplanar overlays: no depth read/write, layered purely by renderOrder
        const m = mk(new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false, depthTest: false }), i);
        m.userData = { tex, el, cv };
        imgs.push(m);
      }
      const white = mk(new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1, side: THREE.DoubleSide, depthWrite: false, depthTest: false }), 10);

      function render() {
        for (const m of imgs) {
          const { el, cv, tex } = m.userData;
          if (el.complete && el.naturalWidth > 0 && !tex.__up) {
            // cover-fit the source into 16:9 so square images (Southern Ring, Quintet) fill the panel
            const sw = el.naturalWidth, sh = el.naturalHeight;
            const scale = Math.max(TEX_W / sw, TEX_H / sh);
            const dw = sw * scale, dh = sh * scale;
            cv.getContext("2d").drawImage(el, (TEX_W - dw) / 2, (TEX_H - dh) / 2, dw, dh);
            tex.needsUpdate = true;
            tex.__up = true;
          }
        }
        renderer.render(scene, camera);
      }

      const tl = gsap.timeline({ paused: true, defaults: { ease: "power2.inOut" } });
      tl.eventCallback("onUpdate", render);

      // ---- act 1: the line becomes a screen (0–8) -------------------------------
      group.scale.set(0, 0.006, 1);
      tl.to(group.scale, { x: 1, duration: 2.2, ease: "power3.out" }, 0.6);
      tl.to(group.scale, { y: 1, duration: 2.8 }, 3.2);
      tl.to(state, { bend: 1, duration: 2.8, onUpdate: applyBend }, 3.2);
      tl.to(white.material, { opacity: 0, duration: 1.6 }, 6.4);
      tl.to(imgs[0].material, { opacity: 1, duration: 1.6 }, 6.4);

      // ---- act 2: five broadcasts with the app's parallax tilt (8–33) -----------
      // gentle continuous life for the whole film
      tl.to(group.rotation, { z: 0.012, duration: 5, yoyo: true, repeat: 7, ease: "sine.inOut" }, 0);
      tl.to(camera.position, { z: 3.8, duration: 27, ease: "sine.inOut", onUpdate: render }, 6.5);

      const show = (i, t) => {
        tl.to(imgs[i - 1].material, { opacity: 0, duration: 1.2 }, t);
        tl.to(imgs[i].material, { opacity: 1, duration: 1.2 }, t);
      };
      // cliffs
      tl.to(group.rotation, { y: 0.16, x: -0.05, duration: 2.4, ease: "sine.inOut" }, 8.2);
      tl.to(group.rotation, { y: -0.13, x: 0.04, duration: 2.6, ease: "sine.inOut" }, 10.6);
      show(1, 13.2);                                                        // pillars
      tl.to(group.rotation, { y: 0.12, x: -0.035, duration: 3.2, ease: "sine.inOut" }, 14.0);
      show(2, 18.2);                                                        // southern ring
      tl.to(group.rotation, { y: -0.14, x: 0.045, duration: 3.4, ease: "sine.inOut" }, 18.8);
      show(3, 23.2);                                                        // stephan's quintet
      tl.to(group.rotation, { y: 0.1, x: -0.03, duration: 3.2, ease: "sine.inOut" }, 23.8);
      show(4, 28.2);                                                        // deep field
      tl.to(group.rotation, { y: 0, x: 0, duration: 3.0, ease: "sine.inOut" }, 28.6);

      // ---- act 3: the screen folds back into the line, the name remains (33–40) -
      tl.to(imgs[4].material, { opacity: 0, duration: 1.4 }, 33.2);
      tl.to(white.material, { opacity: 1, duration: 1.4 }, 33.2);
      tl.to(state, { bend: 0, duration: 1.8, onUpdate: applyBend, ease: "power2.inOut" }, 34.8);
      tl.to(group.scale, { y: 0.006, duration: 1.8 }, 34.8);
      tl.to(group.scale, { x: 0, duration: 1.3, ease: "power3.in" }, 36.7);
      tl.to("#word", { opacity: 0.92, duration: 1.6 }, 37.2);
      tl.to("#word", { opacity: 0, duration: 1.2, ease: "power2.in" }, 38.8);

      applyBend();
      render();
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
